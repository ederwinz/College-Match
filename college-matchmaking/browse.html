<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse — College Match</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <a href="browse.html" class="logo">College Match</a>
    <nav class="nav">
      <a href="profile.html">Profile</a>
      <a href="matches.html">Matches</a>
      <button id="logout-btn" class="btn">Log out</button>
    </nav>
  </header>

  <main class="browse-page">
    <div id="card-container" class="card-container">
      <!-- Profile cards will be inserted here by JS -->
    </div>
    <div id="empty-state" class="empty-state" style="display: none;">
      <p>No more profiles to show right now. Check back later!</p>
    </div>
    <div class="swipe-buttons">
      <button id="pass-btn" class="btn btn-swipe btn-pass">Pass</button>
      <button id="like-btn" class="btn btn-swipe btn-like">Like</button>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/browse.js"></script>
</body>
</html>
